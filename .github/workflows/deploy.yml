name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get git commit hash
        id: commit
        run: echo "short_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Inject version into widget
        run: |
          COMMIT_HASH="${{ steps.commit.outputs.short_hash }}"
          # Copy widget to site if not already there
          if [ ! -f site/spikes.js ] || ! grep -q "window.SpikesVersion" site/spikes.js; then
            cp widget/spikes.js site/spikes.js
          fi
          # Inject version constant at the start (after use strict)
          sed -i "s/'use strict';/'use strict';\n    \/\/ Version: $COMMIT_HASH/g" site/spikes.js
          echo "Widget versioned with commit: $COMMIT_HASH"

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not configured. Add it in Settings > Secrets > Actions."
            echo "::error::Get your API token from https://dash.cloudflare.com/profile/api-tokens"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret is not configured. Add it in Settings > Secrets > Actions."
            echo "::error::Find your Account ID at https://dash.cloudflare.com (right sidebar on overview page)"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: spikes
          directory: site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
