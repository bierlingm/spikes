commands:
  install: cd cli && cargo build
  test: cd cli && cargo test --jobs 5
  build: cd cli && cargo build --release
  check: cd cli && cargo check

services:
  spikes-serve:
    start: cd cli && cargo run -- serve --port 3847
    stop: lsof -ti :3847 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3847/ || true
    port: 3847
    depends_on: []
