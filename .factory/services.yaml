commands:
  install-cli: cd cli && cargo build
  install-worker: cd ../spikes-hosted/worker && npm install
  test-cli: cd cli && cargo test
  test-worker: cd ../spikes-hosted/worker && npx vitest run
  typecheck-worker: cd ../spikes-hosted/worker && npx tsc --noEmit
  build-cli: cd cli && cargo build --release
  lint-worker: cd ../spikes-hosted/worker && npx eslint src test

services:
  spikes-serve:
    start: cd cli && cargo run -- serve --port 3847
    stop: lsof -ti :3847 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3847/ || true
    port: 3847
    depends_on: []

  wrangler-dev:
    start: cd ../spikes-hosted/worker && npx wrangler dev --port 8787
    stop: lsof -ti :8787 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:8787/health
    port: 8787
    depends_on: []
