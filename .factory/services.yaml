commands:
  install: cd cli && cargo build
  test: cd cli && cargo test --jobs 5
  test-worker: cd ../spikes-hosted/worker && npx vitest run
  typecheck-worker: cd ../spikes-hosted/worker && npx tsc --noEmit
  lint-worker: cd ../spikes-hosted/worker && npx eslint src/
  build: cd cli && cargo build --release
  check: cd cli && cargo check
  clippy: cd cli && cargo clippy -- -D warnings

services:
  spikes-serve:
    start: cd cli && cargo run -- serve --port 3847
    stop: lsof -ti :3847 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3847/ || true
    port: 3847
    depends_on: []

  wrangler-dev:
    start: cd ../spikes-hosted/worker && npx wrangler dev --port 8787
    stop: lsof -ti :8787 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:8787/health || true
    port: 8787
    depends_on: []

  mcp-http:
    start: cd cli && cargo run -- mcp serve --transport http --port 3848
    stop: lsof -ti :3848 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3848/ || true
    port: 3848
    depends_on: []
