<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#09090b"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1f1f23" stroke-width="0.5"/>
  </pattern>
  <rect width="512" height="512" fill="url(#grid)" opacity="0.4"/>

  <!-- Red accent line at top -->
  <rect x="0" y="0" width="512" height="4" fill="url(#redGradient)"/>

  <!-- Central spike mark -->
  <g transform="translate(256, 200)" filter="url(#glow)">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="160" font-weight="700" fill="url(#redGradient)" text-anchor="middle" dominant-baseline="central">/</text>
  </g>

  <!-- "Spikes" wordmark -->
  <text x="256" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#fafafa" text-anchor="middle">Spikes</text>

  <!-- "Agent" label -->
  <rect x="186" y="350" width="140" height="32" rx="6" fill="url(#redGradient)" opacity="0.9"/>
  <text x="256" y="372" font-family="ui-monospace, monospace" font-size="16" font-weight="600" fill="#fafafa" text-anchor="middle">AGENT</text>

  <!-- Usage indicator dots -->
  <g transform="translate(256, 430)" opacity="0.6">
    <circle cx="-60" cy="0" r="4" fill="#e74c3c"/>
    <circle cx="-40" cy="0" r="4" fill="#e74c3c"/>
    <circle cx="-20" cy="0" r="4" fill="#e74c3c"/>
    <circle cx="0" cy="0" r="4" fill="#e74c3c" opacity="0.6"/>
    <circle cx="20" cy="0" r="4" fill="#e74c3c" opacity="0.4"/>
    <circle cx="40" cy="0" r="4" fill="#e74c3c" opacity="0.2"/>
    <circle cx="60" cy="0" r="4" fill="#27272a"/>
  </g>

  <!-- Subtitle -->
  <text x="256" y="470" font-family="ui-monospace, monospace" font-size="14" fill="#52525b" text-anchor="middle">usage-based MCP access</text>
</svg>
